<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>多圖層影片剪輯器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-card">
        <p class="login-kicker">本機登入</p>
        <h1>多圖層影片剪輯器</h1>
        <label>帳號
          <input id="loginAccount" type="text" autocomplete="username" required />
        </label>
        <label>密碼
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <label class="checkline">
          <input id="rememberLogin" type="checkbox" />
          快取帳號密碼
        </label>
        <button class="primary" type="submit">登入編輯頁面</button>
        <button id="clearLoginCacheBtn" class="secondary" type="button">清除快取</button>
        <p id="loginStatus" class="status">請輸入帳號密碼後進入編輯頁面。</p>
      </form>
    </section>

    <main class="app" id="editorApp" hidden>
      <header class="hero">
        <div>
          <p>Chrome 本機網頁程式</p>
          <h1>多圖層影片剪輯器</h1>
        </div>
        <div class="actions">
          <button id="chooseFolderBtn" class="secondary" type="button">選擇暫存資料夾</button>
          <button id="saveProjectBtn" class="secondary" type="button">儲存暫存</button>
          <button id="openProjectBtn" class="secondary" type="button">開啟暫存檔</button>
          <button id="editProjectBtn" class="primary" type="button" disabled>繼續編輯</button>
          <button id="logoutBtn" class="secondary" type="button">登出</button>
        </div>
      </header>

      <section class="notice">
        <strong>暫存位置</strong>
        <span id="folderStatus">請選擇 C:/Users/tlri/OneDrive/Desktop/Codex-網頁程式/新資料夾。每次儲存會產生不同暫存檔，例如 video-project-cache-202606261430.json。</span>
        <select id="projectFileSelect"></select>
      </section>

      <input id="photoInput" type="file" accept="image/*" multiple hidden />
      <input id="videoInput" type="file" accept="video/*" hidden />
      <input id="musicInput" type="file" accept="audio/*" hidden />
      <input id="narrationInput" type="file" accept="audio/*" hidden />
      <input id="projectInput" type="file" accept="application/json,.json" hidden />

      <section class="grid">
        <section class="panel">
          <div class="preview">
            <canvas id="canvas" width="1280" height="720"></canvas>
          </div>
          <div class="transport">
            <button id="playBtn" class="primary" type="button">試播</button>
            <button id="stopBtn" class="secondary" type="button">停止</button>
            <button id="renderBtn" class="primary" type="button">產生影片（含旁白與背景音樂）</button>
            <a id="downloadLink" class="download disabled" href="#" download="youtube-ready-video.webm">下載 YouTube 影片</a>
          </div>
          <progress id="progress" value="0" max="100"></progress>
          <video id="resultVideo" controls playsinline></video>
          <p id="status" class="status">請先加入素材，或開啟暫存檔繼續編輯。</p>
        </section>

        <aside class="panel">
          <h2>新增素材</h2>
          <div class="actions vertical">
            <button id="addPhotoBtn" class="secondary" type="button">新增照片</button>
            <button id="addVideoBtn" class="secondary" type="button">新增影片</button>
            <button id="addSubtitleBtn" class="secondary" type="button">新增字幕</button>
            <button id="addMusicBtn" class="secondary" type="button">新增背景音樂</button>
            <button id="addNarrationBtn" class="secondary" type="button">新增旁白音檔</button>
          </div>

          <h2>人聲錄音</h2>
          <div class="actions vertical">
            <button id="startRecordBtn" class="secondary" type="button">開始錄音</button>
            <button id="stopRecordBtn" class="danger" type="button" disabled>停止錄音</button>
          </div>
          <audio id="recordPreview" controls hidden></audio>

          <h2>片段設定</h2>
          <label>開始秒數 <input id="clipStart" type="number" min="0" step="0.1" /></label>
          <label>長度秒數 <input id="clipDuration" type="number" min="0.1" step="0.1" /></label>
          <label id="textSetting">字幕文字 <textarea id="clipText" rows="3"></textarea></label>
          <label>背景音樂處理
            <select id="musicMode">
              <option value="duck">旁白時弱化</option>
              <option value="remove">旁白時停用</option>
              <option value="keep">保持原音量</option>
            </select>
          </label>
          <button id="deleteClipBtn" class="danger" type="button">刪除選取片段</button>
        </aside>
      </section>

      <section class="panel timeline-panel">
        <div class="timeline-head">
          <h2>時間軸</h2>
          <span id="timeInfo">00:00:00 / 00:00:00</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <div id="mediaBin" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
